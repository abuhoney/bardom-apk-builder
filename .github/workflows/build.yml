name: Bardom Android APK Builder

on:
  push:
    branches:
      - build-run
    paths:
      - 'project.zip'

env:
  ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system utilities
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip wget jq

      - name: Read Telegram Config
        id: tg_config
        run: |
          if [ -f "tg_config.json" ]; then
            CHAT_ID=$(jq -r '.chat_id' tg_config.json)
            MESSAGE_ID=$(jq -r '.message_id' tg_config.json)
            BOT_TOKEN=$(jq -r '.bot_token' tg_config.json)
            echo "CHAT_ID=$CHAT_ID" >> $GITHUB_ENV
            echo "MESSAGE_ID=$MESSAGE_ID" >> $GITHUB_ENV
            echo "BOT_TOKEN=$BOT_TOKEN" >> $GITHUB_ENV
            echo "::add-mask::$BOT_TOKEN"
            echo "Found Telegram configuration. Chat ID: $CHAT_ID"
          else
            echo "❌ Error: tg_config.json not found!"
            exit 1
          fi

      - name: Notify Telegram build started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ env.CHAT_ID }}" \
            -d "reply_to_message_id=${{ env.MESSAGE_ID }}" \
            -d "text=⚙️ بدأت الآن عملية إعداد وحل الاعتماديات لمشروع Gradle على خوادم GitHub Actions... يرجى الانتظار ⏳"

      - name: Extract Project ZIP
        run: |
          mkdir -p android_project
          unzip -o project.zip -d android_project
          # If project was zipped such that content is in a subdirectory move it up
          if [ -d "android_project/app" ] || [ -f "android_project/build.gradle" ] || [ -f "android_project/build.gradle.kts" ]; then
            echo "ZIP contains files at the root of extraction."
          else
            SUBDIR=$(find android_project -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -n "$SUBDIR" ]; then
              echo "Moving files from subdirectory $SUBDIR to android_project root..."
              mv "$SUBDIR"/* android_project/ 2>/dev/null || true
              mv "$SUBDIR"/.[!.]* android_project/ 2>/dev/null || true || true
            fi
          fi
          ls -la android_project

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install Android SDK command-line tools and platforms
        shell: bash
        run: |
          set -e
          mkdir -p "$ANDROID_SDK_ROOT"
          cd $RUNNER_TEMP
          # download latest command line tools (link version may be updated if Google changes).
          CMDLINE_ZIP="commandlinetools-linux-100.0.0_latest.zip"
          # try a stable url; if it fails adapt the url/version
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -O cmdline.zip || wget -q "https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip" -O cmdline.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          unzip -q cmdline.zip -d cmdline-temp
          # the zip contains a top-level 'cmdline-tools' directory
          mv cmdline-temp/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/" || true
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2" "platforms;android-31" || true
          echo "Android SDK installed to $ANDROID_SDK_ROOT"

      - name: Ensure gradlew is executable (or generate wrapper)
        run: |
          cd android_project
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "⚠️ gradlew wrapper not found. Attempting to initialize wrapper (requires 'gradle' available)."
            if command -v gradle >/dev/null 2>&1; then
              gradle wrapper --gradle-version 8.0
              chmod +x gradlew
            else
              echo "No gradle installed and gradlew not included in ZIP. Build may fail unless the project includes the wrapper."
            fi
          fi

      - name: Build Debug APK
        id: build_apk
        run: |
          set -e
          cd android_project
          echo "Using JAVA_HOME=$JAVA_HOME"
          # run Gradle wrapper with stacktrace and no daemon to be more predictable in CI
          ./gradlew --no-daemon --stacktrace assembleDebug || { echo "Gradle build failed. Displaying last 100 lines of build log:"; tail -n 100 android_project/build/*.log || true; exit 1; }

          # Try common APK output paths
          APK_PATH=$(find app/build/outputs/apk/debug/ -type f -name "*.apk" | head -n 1 || true)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -type f -name "*-debug.apk" | head -n 1 || true)
          fi

          if [ -n "$APK_PATH" ]; then
            # Make path relative to repository root for uploading
            REL_PATH="android_project/$APK_PATH"
            echo "APK_PATH=$REL_PATH" >> $GITHUB_ENV
            echo "✅ Successfully built APK: $REL_PATH"
          else
            echo "❌ Error: APK file was not found after Gradle build!"
            ls -R app/build || true
            exit 1
          fi

      - name: Upload APK to Telegram Chat
        if: success()
        run: |
          if [ -z "${{ env.APK_PATH }}" ]; then
            echo "APK_PATH not set, skipping Telegram upload."
            exit 1
          fi
          curl -s -F chat_id="${{ env.CHAT_ID }}" \
            -F reply_to_message_id="${{ env.MESSAGE_ID }}" \
            -F document=@"${{ env.APK_PATH }}" \
            -F caption="🎉 تم بناء ملف الـ APK بنجاح! 🚀📱" \
            "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument"

      - name: Upload APK as workflow artifact (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: ${{ env.APK_PATH }}

      - name: Send failure message to Telegram on error
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ env.CHAT_ID }}" \
            -d "reply_to_message_id=${{ env.MESSAGE_ID }}" \
            -d "text=❌ فشلت عملية بناء الـ APK. يرجى التحقق من سجلات العمل في GitHub Actions."
